    --paper-2: oklch(0.95 0.012 240);
    --ink: oklch(0.20 0.02 240);
    --ink-2: oklch(0.40 0.02 240);
    --ink-3: oklch(0.60 0.015 240);
    --rule: oklch(0.86 0.012 240);
    --rule-2: oklch(0.78 0.018 240);
    --amber: oklch(0.52 0.14 250);
    --amber-deep: oklch(0.38 0.14 248);
    --amber-soft: oklch(0.93 0.04 248);

  body {

  .serif { font-family: "Newsreader", Georgia, serif; font-weight: 500; letter-spacing: -0.01em; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-feature-settings: "tnum" 1; }
  a { color: inherit; }

  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }

  /* Masthead */
  .masthead {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 14px;
    gap: 24px;
    flex-wrap: wrap;
  }
  .masthead-left .eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-2);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .masthead-left h1 {
    margin: 0;
    font-family: "Newsreader", Georgia, serif;
    font-weight: 500;
    font-size: clamp(34px, 5vw, 54px);
    line-height: 0.95;
    letter-spacing: -0.025em;
  }
  .masthead-left h1 em { font-style: italic; color: var(--amber-deep); }
  .masthead-right {
    text-align: right;
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.5;
  }
  .masthead-right .stamp {
    display: inline-block;
    border: 1.5px solid var(--ink);
    padding: 4px 9px 3px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* Scout selector */
  .selector {
    margin: 22px 0 30px;
    padding: 14px 16px;
    background: var(--paper-2);
    border: 1px solid var(--rule);
    border-radius: 4px;
  }
  .selector-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-2);
    margin-bottom: 10px;
    font-weight: 600;
  }
  .scout-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .scout-chip {
    padding: 6px 11px;
    border: 1px solid var(--rule-2);
    border-radius: 999px;
    background: var(--paper);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    transition: all 0.12s;
    position: relative;
  }
  .scout-chip:hover { border-color: var(--ink); color: var(--ink); }
  .scout-chip.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .scout-chip .rank-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 999px;
    background: var(--amber);
    margin-left: 7px;
    vertical-align: 2px;
  }
  .scout-chip.earned { color: var(--ink); }
  .scout-chip.earned.active { color: var(--paper); }
  .scout-chip.active .rank-dot { background: var(--paper); }

  /* Hero rank summary */
  .hero {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: center;
    padding: 26px 0 32px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 36px;
  }
  @media (max-width: 720px) {
    .hero { grid-template-columns: 1fr; gap: 20px; }
  }
  .hero-name {
    font-family: "Newsreader", Georgia, serif;
    font-size: clamp(40px, 6vw, 64px);
    line-height: 0.95;
    letter-spacing: -0.025em;
    font-weight: 500;
    margin: 0 0 10px;
  }
  .hero-status {
    font-size: 14px;
    color: var(--ink-2);
    max-width: 50ch;
  }
  .rank-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--amber-soft);
    color: var(--amber-deep);
    padding: 3px 9px 3px 7px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .rank-pill.complete { background: var(--green-soft); color: var(--green); }
  .rank-pill::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 99px;
    background: currentColor;
  }
  .hero-meters {
    display: flex;
    gap: 18px;
    align-items: stretch;
  }
  .meter {
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 14px 18px 12px;
    background: var(--paper-2);
    min-width: 150px;
  }
  .meter-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-2);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .meter-value {
    font-family: "JetBrains Mono", monospace;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
  }
  .meter-value .of {
    color: var(--ink-3);
    font-size: 18px;
  }
  .meter-bar {
    margin-top: 10px;
    height: 4px;
    background: var(--slate-soft);
    border-radius: 2px;
    overflow: hidden;
  }
  .meter-bar-fill {
    height: 100%;
    background: var(--amber);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .meter.complete .meter-bar-fill { background: var(--green); }

  /* Section */
  .section { margin-bottom: 36px; }
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .section-title {
    font-family: "Newsreader", Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.015em;
  }
  .section-title em { font-style: italic; color: var(--ink-2); }
  .section-rule {
    font-size: 11px;
    color: var(--ink-2);
    letter-spacing: 0.04em;
  }

  /* Adventure grid */
  .adv-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
    border: 1px solid var(--rule);
    border-radius: 6px;
    overflow: hidden;
    background: var(--paper);
  }
  @media (max-width: 720px) { .adv-grid { grid-template-columns: 1fr; } }
  .adv {
    border-bottom: 1px solid var(--rule);
    border-right: 1px solid var(--rule);
    background: var(--paper);
    transition: background 0.15s;
  }
  .adv:nth-child(2n) { border-right: 0; }
  @media (max-width: 720px) { .adv { border-right: 0; } }
  .adv.open {
    background: var(--paper-2);
    grid-column: 1 / -1;
    border-right: 0;
  }
  .adv-row {
    width: 100%;
    text-align: left;
    display: grid;
    grid-template-columns: 28px 1fr auto auto;
    gap: 14px;
    align-items: center;
    padding: 14px 18px;
    transition: background 0.15s;
  }
  .adv-row:hover { background: var(--paper-2); }
  .adv.open .adv-row { background: transparent; }
  .adv-row[disabled] { cursor: default; }

  .adv-icon {
    width: 22px; height: 22px;
    border-radius: 999px;
    border: 1.5px solid var(--ink-3);
    background: var(--paper);
    position: relative;
    flex-shrink: 0;
  }
  .adv-icon.partial {
    border-color: var(--amber);
    background: conic-gradient(var(--amber) calc(var(--p, 0) * 1%), transparent 0);
  }
  .adv-icon.partial::after {
    content: "";
    position: absolute;
    inset: 3px;
    border-radius: 999px;
    background: var(--paper);
  }
  .adv-icon.complete {
    background: var(--green);
    border-color: var(--green);
  }
  .adv-icon.complete::after {
    content: "";
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M4 8.5l2.5 2.5L12 5.5' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>") center / 14px no-repeat;
  }
  .adv.open .adv-icon { background: var(--paper-2); }
  .adv.open .adv-icon.complete { background: var(--green); }
  .adv.open .adv-icon.partial::after { background: var(--paper-2); }

  .adv-title {
    font-family: "Newsreader", Georgia, serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.005em;

    margin-left: 8px;

    letter-spacing: 0.1em;

    background: var(--amber-soft);

    border-radius: 3px;
    vertical-align: 3px;
    font-weight: 600;

  .adv-sub {

    color: var(--ink-3);
    margin-top: 3px;

  .adv-progress {

    font-size: 13px;
    color: var(--ink-2);
    font-weight: 500;
    white-space: nowrap;

  .adv-progress.complete { color: var(--green); }
  .adv-chev {
    width: 18px;
    color: var(--ink-3);
    transition: transform 0.2s;
  }
  .adv.open .adv-chev { transform: rotate(180deg); color: var(--ink); }
  .adv-chev.hidden { visibility: hidden; }

  /* Expanded body */
  .adv-body {
    padding: 0 18px 20px 60px;
    border-top: 1px dashed var(--rule);
    margin-top: -1px;
    padding-top: 16px;
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 28px;

  @media (max-width: 720px) {
    .adv-body { grid-template-columns: 1fr; padding: 16px 18px 18px; }

  .req-list { margin: 0; padding: 0; list-style: none; }
  .req {
    display: grid;
    grid-template-columns: 22px 1fr auto;
    gap: 12px;
    align-items: start;
    padding: 9px 0;
    border-bottom: 1px dotted var(--rule);
    font-size: 14px;
    line-height: 1.4;

  .req:last-child { border-bottom: 0; }
  .req-check {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--ink-3);
    background: var(--paper);
    margin-top: 1px;
    position: relative;
    flex-shrink: 0;

  .req-check.done { background: var(--green); border-color: var(--green); }
  .req-check.done::after {
    content: "";
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><path d='M4 8.5l2.5 2.5L12 5.5' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>") center / 14px no-repeat;
  }
  .req-text { color: var(--ink); }
  .req-text.done { color: var(--ink-3); text-decoration: line-through; text-decoration-color: var(--ink-3); }
  .req-when {
    font-size: 11px;
    color: var(--ink-2);
    font-weight: 500;
    white-space: nowrap;
    padding-top: 2px;
  }
  .req-when.home { color: var(--amber-deep); }

  .adv-sidebar {
    border-left: 1px solid var(--rule);
    padding-left: 24px;
  }
  @media (max-width: 720px) {
    .adv-sidebar { border-left: 0; border-top: 1px solid var(--rule); padding: 16px 0 0; }
  }
  .sidebar-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-2);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .sidebar-item {
    font-size: 13px;
    margin-bottom: 8px;
    line-height: 1.35;
  }
  .sidebar-item .when-tag {
    display: inline-block;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    padding: 1px 6px;
    background: var(--slate-soft);
    color: var(--ink-2);
    border-radius: 3px;
    margin-right: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .sidebar-item .when-tag.home { background: var(--amber-soft); color: var(--amber-deep); }
  .sidebar-empty {
    font-size: 12px;
    color: var(--ink-3);
    font-style: italic;
  }

  /* Footer */
  .legend {
    margin-top: 50px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--ink-2);
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 999px; }
  .legend-swatch.complete { background: var(--green); }
  .legend-swatch.partial { background: conic-gradient(var(--amber) 60%, var(--paper-2) 0); border: 1.5px solid var(--amber); }
  .legend-swatch.empty { border: 1.5px solid var(--ink-3); background: var(--paper); }
  .footer-note {
    margin-top: 14px;
    font-size: 11px;
    color: var(--ink-3);
    max-width: 70ch;
    line-height: 1.5;
  }
</style>

const { useState, useEffect, useMemo } = React;

const HOME_RE = /HOME\/PARENT|Home\/Parent|home\/parent/i;

function classifyNote(note) {
  if (!note) return null;
  if (HOME_RE.test(note)) return { kind: 'home', text: 'At home' };
  return { kind: 'when', text: note };
}

function App() {
  const { scouts, adventures } = RAW;
  // index of selected scout
  const [scoutIdx, setScoutIdx] = useState(() => {
    const h = decodeURIComponent((window.location.hash || '').replace('#', ''));
    const found = scouts.findIndex(s => s.toLowerCase().replace(/\s+/g,'-') === h.toLowerCase());
    return found >= 0 ? found : 0;
  });
  const [openId, setOpenId] = useState(null);

  useEffect(() => {
    const slug = scouts[scoutIdx].toLowerCase().replace(/\s+/g, '-');
    if (decodeURIComponent((window.location.hash || '').replace('#','')) !== slug) {
      history.replaceState(null, '', '#' + slug);
    }
    setOpenId(null); // collapse when switching scouts
  }, [scoutIdx]);

  // Per-scout stats per adventure
  const advStats = useMemo(() => adventures.map((a, i) => {
    const done = a.requirements.filter(r => r.done[scoutIdx]).length;
    const total = a.requirements.length;
    const complete = total > 0 && done === total;
    return { idx: i, done, total, complete, pct: total ? done/total : 0 };
  }), [scoutIdx, adventures]);

  const required = adventures.map((a, i) => ({ a, s: advStats[i] })).filter(x => x.a.type === 'Required');
  const electives = adventures.map((a, i) => ({ a, s: advStats[i] })).filter(x => x.a.type === 'Elective');

  const reqDone = required.filter(x => x.s.complete).length;
  const reqTotal = required.length; // 6
  const elecDone = electives.filter(x => x.s.complete).length;
  const elecNeeded = 2;
  const rankEarned = reqDone === reqTotal && elecDone >= elecNeeded;

  // Total raw requirement completion (for overall percent)
  const totalReqs = adventures.reduce((s, a) => s + a.requirements.length, 0);
  const totalDone = adventures.reduce((s, a) => s + a.requirements.filter(r => r.done[scoutIdx]).length, 0);

  const scoutName = scouts[scoutIdx];
  const firstName = scoutName.split(' ')[0];

  return (
    <div className="page">
      {/* Masthead */}
      <header className="masthead">
        <div className="masthead-left">
          <div className="eyebrow">Wolf Den · Pack Advancement</div>
          <h1>The Wolf <em>Ledger</em></h1>
        </div>
        <div className="masthead-right">
          <div className="stamp">Season 2025 — 2026</div>
          <div>Updated {new Date().toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' })}</div>
        </div>
      </header>

      {/* Selector */}
      <div className="selector">
        <div className="selector-label">Showing progress for · <span style={{textTransform:'none',letterSpacing:0,fontWeight:500,color:'var(--ink-3)'}}>scouts marked <span style={{display:'inline-block',width:6,height:6,borderRadius:999,background:'var(--amber)',verticalAlign:2,marginLeft:2,marginRight:2}}></span> have earned Wolf rank</span></div>
        <div className="scout-chips">
          {scouts.map((s, i) => {
            const reqDoneI = adventures.filter(a => a.type === 'Required' && a.requirements.every(r => r.done[i])).length;
            const elecDoneI = adventures.filter(a => a.type === 'Elective' && a.requirements.length > 0 && a.requirements.every(r => r.done[i])).length;
            const earned = reqDoneI === 6 && elecDoneI >= 2;
            return (
              <button
                key={i}
                className={'scout-chip' + (i === scoutIdx ? ' active' : '') + (earned ? ' earned' : '')}
                onClick={() => setScoutIdx(i)}
                title={earned ? 'Wolf rank earned' : undefined}
              >
                {s}
                {earned && <span className="rank-dot" aria-label="Wolf rank earned" />}
              </button>
            );
          })}
        </div>
      </div>

      {/* Hero */}
      <section className="hero">
        <div>
          {rankEarned
            ? <span className="rank-pill complete">Wolf rank earned</span>
            : <span className="rank-pill">In progress · Wolf rank</span>}
          <h2 className="hero-name">{scoutName}</h2>
          <p className="hero-status">
            {rankEarned
              ? <>Congratulations — {firstName} has completed all six required adventures plus the elective threshold.</>
              : <>{firstName} has completed <strong>{reqDone} of {reqTotal}</strong> required adventures and <strong>{elecDone} of {elecNeeded}</strong> needed electives. {totalDone} of {totalReqs} individual requirements checked off so far.</>}
          </p>
        </div>
        <div className="hero-meters">
          <div className={'meter' + (reqDone === reqTotal ? ' complete' : '')}>
            <div className="meter-label">Required</div>
            <div className="meter-value">{reqDone}<span className="of">/{reqTotal}</span></div>
            <div className="meter-bar"><div className="meter-bar-fill" style={{width: `${100*reqDone/reqTotal}%`}}/></div>
          </div>
          <div className={'meter' + (elecDone >= elecNeeded ? ' complete' : '')}>
            <div className="meter-label">Electives</div>
            <div className="meter-value">{elecDone}<span className="of">/{elecNeeded}</span></div>
            <div className="meter-bar"><div className="meter-bar-fill" style={{width: `${Math.min(100, 100*elecDone/elecNeeded)}%`}}/></div>
          </div>
        </div>
      </section>

      <Section
        title="Required Adventures"
        subtitle="Complete all six"
        items={required}
        scoutIdx={scoutIdx}
        openId={openId}
        setOpenId={setOpenId}
      />
      <Section
        title="Elective Adventures"
        subtitle={`Complete any two · ${elecDone} earned`}
        items={electives}
        scoutIdx={scoutIdx}
        openId={openId}
        setOpenId={setOpenId}
        sortIncompleteFirst
      />

      <div className="legend">
        <div className="legend-item"><div className="legend-swatch complete"/> Adventure complete</div>
        <div className="legend-item"><div className="legend-swatch partial"/> In progress — click to see what's left</div>
        <div className="legend-item"><div className="legend-swatch empty"/> Not yet started</div>
      </div>
      <p className="footer-note">
        Notes marked <strong>"At home"</strong> are requirements completed by the Wolf and adult partner outside of den meetings — please record them with your den leader once finished. Den-meeting requirements without a check should be wrapped up at the listed meeting; if your Scout missed it, reach out and we'll schedule a make-up.
      </p>
    </div>
  );
}

function Section({ title, subtitle, items, scoutIdx, openId, setOpenId, sortIncompleteFirst }) {
  const sorted = sortIncompleteFirst
    ? [...items].sort((a, b) => {
        // electives: completed first (so earned ones float to top), then by progress desc
        if (a.s.complete !== b.s.complete) return a.s.complete ? -1 : 1;
        return b.s.pct - a.s.pct;
      })
    : items;

  return (
    <section className="section">
      <div className="section-head">
        <h3 className="section-title">{title} <em>· {subtitle}</em></h3>
      </div>
      <div className="adv-grid">
        {sorted.map(({ a, s }) => (
          <Adventure
            key={s.idx}
            a={a}
            s={s}
            scoutIdx={scoutIdx}
            open={openId === s.idx}
            onToggle={() => setOpenId(openId === s.idx ? null : s.idx)}
          />
        ))}
      </div>
    </section>
  );
}

function Adventure({ a, s, scoutIdx, open, onToggle }) {
  const noteSet = useMemo(() => {
    const seen = new Set();
    const out = [];
    a.requirements.forEach(r => {
      if (r.note && !seen.has(r.note)) {
        seen.add(r.note);
        out.push(r.note);
      }
    });
    return out;
  }, [a]);

  const iconClass = s.complete ? 'complete' : (s.done > 0 ? 'partial' : '');
  const cleanName = a.name.replace(/\s*\(.*?\)\s*$/, '');
  const subtitle = a.name.match(/\(([^)]+)\)\s*$/)?.[1];

  return (
    <div className={'adv' + (open ? ' open' : '')}>
      <button className="adv-row" onClick={onToggle}>
        <span className={'adv-icon ' + iconClass} style={{ '--p': Math.round(s.pct * 100) }}/>
        <span>
          <span className="adv-title">{cleanName}</span>
          {a.tag && <span className="adv-tag">{a.tag}</span>}
          {subtitle && <div className="adv-sub">{subtitle}</div>}
        </span>
        <span className={'adv-progress' + (s.complete ? ' complete' : '')}>{s.done}/{s.total}</span>
        <svg className="adv-chev" viewBox="0 0 20 20" fill="none">
          <path d="M5 8l5 5 5-5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>
      {open && (
        <div className="adv-body">
          <ul className="req-list">
            {a.requirements.map((r, i) => {
              const done = r.done[scoutIdx];
              const note = classifyNote(r.note);
              return (
                <li key={i} className="req">
                  <span className={'req-check' + (done ? ' done' : '')}/>
                  <span className={'req-text' + (done ? ' done' : '')}>{r.text.replace(/^\d+\.\s*/, '')}</span>
                  {note && (
                    <span className={'req-when' + (note.kind === 'home' ? ' home' : '')}>
                      {note.kind === 'home' ? 'At home' : note.text}
                    </span>
                  )}
                </li>
              );
            })}
          </ul>
          <aside className="adv-sidebar">
            <div className="sidebar-label">Where it gets done</div>
            {noteSet.length === 0 ? (
              <div className="sidebar-empty">No scheduled meeting yet — earn this elective independently with your Wolf adult partner.</div>
            ) : (
              noteSet.map((n, i) => {
                const cls = classifyNote(n);
                return (
                  <div key={i} className="sidebar-item">
                    <span className={'when-tag' + (cls.kind === 'home' ? ' home' : '')}>
                      {cls.kind === 'home' ? 'Home' : 'Den'}
                    </span>
                    {cls.kind === 'home' ? 'Parent-led at home' : n}
                  </div>
                );
              })
            )}
            {s.complete && (
              <div className="sidebar-item" style={{ marginTop: 14, color: 'var(--green)', fontWeight: 600 }}>
                ✓ Adventure complete
              </div>
            )}
          </aside>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
